<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Computer Lab - Hardware & Software Repair</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="brand">
                <img src="images/logo.png" alt="Logo for The Computer Lab" class="logo">
                <div class="logo-text">The Computer Lab<span class="sub">Hardware & Software Repair</span></div>
            </div>

            <div class="header-contacts">
                <div class="contact-item">📞 0800 1111</div>
                <div class="contact-item">✉ info@thecomputerlab.com</div>
            </div>
        </div>

        <nav class="main-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="findUs.html">Find Us</a></li>
                <li><a href="commonIssues.html">Common Issues</a></li>
                <li><a href="hardwareGuide.html">Hardware Guide</a></li>
                <li><a class="active" href="contactUs.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="content">
    <div class="contact-container">
        <h2>Start Your Repair</h2>
        <p>Fill out the form below and one of our technicians will get back to you with a diagnostic path.</p>
        
        <form class="repair-form" action="/action_page.php" method="post">
            <div class="form-group-row">
                <div class="form-group">
                    <label for="fname">First Name</label>
                    <input type="text" id="fname" name="fname" placeholder="John" required>
                </div>
                <div class="form-group">
                    <label for="lname">Last Name</label>
                    <input type="text" id="lname" name="lname" placeholder="Doe" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>    
                <input type="email" id="email" name="email" placeholder="john.doe@example.com" required>
            </div>

            <div class="form-group-row">
                <div class="form-group">
                    <label for="device">Device Type</label>
                    <select id="device" name="device">
                        <option value="laptop">Laptop</option>
                        <option value="desktop">Desktop / Gaming PC</option>
                        <option value="mac">Apple Mac</option>
                        <option value="tablet">Tablet / iPad</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="model">Make & Model</label>
                    <input type="text" id="model" name="model" placeholder="e.g. Dell XPS 15">
                </div>
            </div>

            <div class="form-group">
                <label for="help">How can we help?</label>
                <textarea id="help" name="help" rows="5" placeholder="Please describe the issue (e.g. cracked screen, won't turn on, water damage...)"></textarea>
            </div>

            <div class="form-group">
                <label for="contact-method">Preferred Contact Method</label>
                <select id="contact-method" name="contact-method">
                    <option value="email">Email</option>
                    <option value="phone">Phone Call</option>
                    <option value="text">SMS / Text Message</option>
                </select>
            </div>

            <button type="submit" class="submit-btn">Send to the Lab</button>
        </form> 
    </div>
</main>

    <footer class="footer">
        <p>&#169; 2026 The Computer Lab</p>
    </footer>
</body>
</html>
